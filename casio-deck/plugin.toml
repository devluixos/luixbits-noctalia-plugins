id = "luixbits/casio-deck"
name = "Casio Deck"
version = "0.1.0"
min_noctalia = "5.0.0"
author = "LuixBits"
license = "MIT"
tags = ["watch", "controller", "stream-deck", "casio"]
icon = "device-watch"
description = "Foundation for using a Casio watch as a stream-deck-like Noctalia controller."

[[setting]]
key = "notify_on_press"
type = "bool"
label_key = "settings.notify_on_press.label"
description_key = "settings.notify_on_press.description"
default = true

[[setting]]
key = "helper_command"
type = "string"
label_key = "settings.helper_command.label"
description_key = "settings.helper_command.description"
default = ""
advanced = true

[[setting]]
key = "autostart_helper"
type = "bool"
label_key = "settings.autostart_helper.label"
description_key = "settings.autostart_helper.description"
default = false
advanced = true

[[setting]]
key = "stop_command"
type = "string"
label_key = "settings.stop_command.label"
description_key = "settings.stop_command.description"
default = ""
advanced = true

[[setting]]
key = "pair_command"
type = "string"
label_key = "settings.pair_command.label"
description_key = "settings.pair_command.description"
default = ""
advanced = true

[[setting]]
key = "watch_model"
type = "select"
label_key = "settings.watch_model.label"
description_key = "settings.watch_model.description"
default = "casio_abl100we_3565"
options = [
  { value = "casio_abl100we_3565", label = "Casio ABL-100WE (module 3565)" },
]

[[setting]]
key = "saved_watch_name"
type = "string"
label_key = "settings.saved_watch_name.label"
description_key = "settings.saved_watch_name.description"
default = ""
advanced = true

[[setting]]
key = "saved_watch_address"
type = "string"
label_key = "settings.saved_watch_address.label"
description_key = "settings.saved_watch_address.description"
default = ""
advanced = true

[[setting]]
key = "trigger_action_map"
type = "string"
label_key = "settings.trigger_action_map.label"
description_key = "settings.trigger_action_map.description"
default = ""
advanced = true

[[setting]]
key = "youtube_channel_url"
type = "string"
label_key = "settings.youtube_channel_url.label"
description_key = "settings.youtube_channel_url.description"
default = "https://www.youtube.com/@LuixBits"

[[setting]]
key = "explanation_video_url"
type = "string"
label_key = "settings.explanation_video_url.label"
description_key = "settings.explanation_video_url.description"
default = ""

[[setting]]
key = "lower_left_preset"
type = "select"
label_key = "settings.lower_left_preset.label"
description_key = "settings.lower_left_preset.description"
default = "lock"
options = [
  { value = "none", label = "Do nothing" },
  { value = "notification_test", label = "Notification test" },
  { value = "media_play_pause", label = "Media play-pause" },
  { value = "volume_up", label = "Volume up" },
  { value = "volume_down", label = "Volume down" },
  { value = "screenshot_region", label = "Screenshot region" },
  { value = "clipboard", label = "Clipboard" },
  { value = "launcher", label = "Launcher" },
  { value = "lock", label = "Lock screen" },
  { value = "audio_mute_toggle", label = "Toggle output mute" },
  { value = "mic_mute_toggle", label = "Toggle microphone mute" },
  { value = "teams_accept_audio", label = "Teams accept audio call" },
  { value = "teams_accept_video", label = "Teams accept video call" },
  { value = "teams_toggle_mute", label = "Teams toggle mute" },
  { value = "teams_decline_call", label = "Teams decline call" },
  { value = "teams_leave_call", label = "Teams leave call" },
]

[[setting]]
key = "lower_left_command"
type = "string"
label_key = "settings.lower_left_command.label"
description_key = "settings.lower_left_command.description"
default = ""

[[setting]]
key = "lower_right_preset"
type = "select"
label_key = "settings.lower_right_preset.label"
description_key = "settings.lower_right_preset.description"
default = "teams_accept_audio"
options = [
  { value = "none", label = "Do nothing" },
  { value = "notification_test", label = "Notification test" },
  { value = "media_play_pause", label = "Media play-pause" },
  { value = "volume_up", label = "Volume up" },
  { value = "volume_down", label = "Volume down" },
  { value = "screenshot_region", label = "Screenshot region" },
  { value = "clipboard", label = "Clipboard" },
  { value = "launcher", label = "Launcher" },
  { value = "lock", label = "Lock screen" },
  { value = "audio_mute_toggle", label = "Toggle output mute" },
  { value = "mic_mute_toggle", label = "Toggle microphone mute" },
  { value = "teams_accept_audio", label = "Teams accept audio call" },
  { value = "teams_accept_video", label = "Teams accept video call" },
  { value = "teams_toggle_mute", label = "Teams toggle mute" },
  { value = "teams_decline_call", label = "Teams decline call" },
  { value = "teams_leave_call", label = "Teams leave call" },
]

[[setting]]
key = "lower_right_command"
type = "string"
label_key = "settings.lower_right_command.label"
description_key = "settings.lower_right_command.description"
default = ""

[[setting]]
key = "finder_preset"
type = "select"
label_key = "settings.finder_preset.label"
description_key = "settings.finder_preset.description"
default = "audio_mute_toggle"
options = [
  { value = "none", label = "Do nothing" },
  { value = "notification_test", label = "Notification test" },
  { value = "media_play_pause", label = "Media play-pause" },
  { value = "volume_up", label = "Volume up" },
  { value = "volume_down", label = "Volume down" },
  { value = "screenshot_region", label = "Screenshot region" },
  { value = "clipboard", label = "Clipboard" },
  { value = "launcher", label = "Launcher" },
  { value = "lock", label = "Lock screen" },
  { value = "audio_mute_toggle", label = "Toggle output mute" },
  { value = "mic_mute_toggle", label = "Toggle microphone mute" },
  { value = "teams_accept_audio", label = "Teams accept audio call" },
  { value = "teams_accept_video", label = "Teams accept video call" },
  { value = "teams_toggle_mute", label = "Teams toggle mute" },
  { value = "teams_decline_call", label = "Teams decline call" },
  { value = "teams_leave_call", label = "Teams leave call" },
]

[[setting]]
key = "finder_command"
type = "string"
label_key = "settings.finder_command.label"
description_key = "settings.finder_command.description"
default = ""

[[service]]
id = "bridge"
entry = "entries/service/bridge.luau"

[[widget]]
id = "status"
entry = "entries/widgets/status.luau"

  [[widget.setting]]
  key = "label"
  type = "string"
  label = "Label"
  description = "Text shown next to the watch glyph in the bar."
  default = "Casio"

  [[widget.setting]]
  key = "show_label"
  type = "bool"
  label = "Show label"
  description = "Show text next to the watch glyph."
  default = true

  [[widget.setting]]
  key = "show_press_count"
  type = "bool"
  label = "Show press count"
  description = "Append the number of received button presses to the bar label."
  default = true

  [[widget.setting]]
  key = "hide_disconnected"
  type = "bool"
  label = "Hide while disconnected"
  description = "Hide the bar widget until the bridge reports a connected watch."
  default = false

[[shortcut]]
id = "toggle"
entry = "entries/shortcuts/shortcut.luau"

[[desktop_widget]]
id = "dashboard"
entry = "dashboard.luau"
