id = "luixbits/casio-deck"
name = "Casio Deck"
version = "0.1.0"
min_noctalia = "5.0.0"
author = "LuixBits"
license = "MIT"
tags = ["watch", "controller", "stream-deck", "casio"]
icon = "device-watch"
description = "Foundation for using a Casio watch as a stream-deck-like Noctalia controller."

[[setting]]
key = "notify_on_press"
type = "bool"
label_key = "settings.notify_on_press.label"
description_key = "settings.notify_on_press.description"
default = true

[[setting]]
key = "helper_command"
type = "string"
label_key = "settings.helper_command.label"
description_key = "settings.helper_command.description"
default = ""
advanced = true

[[setting]]
key = "scan_command"
type = "string"
label_key = "settings.scan_command.label"
description_key = "settings.scan_command.description"
default = ""
advanced = true

[[setting]]
key = "watch_model"
type = "select"
label_key = "settings.watch_model.label"
description_key = "settings.watch_model.description"
default = "generic_abcd"
options = [
  { value = "generic_abcd", label = "Generic A/B/C/D" },
  { value = "casio_abl100we_3565", label = "Casio ABL-100WE (module 3565)" },
  { value = "future_casio_ble", label = "Other Casio Bluetooth watch (unsupported)" },
]

[[setting]]
key = "trigger_action_map"
type = "string"
label_key = "settings.trigger_action_map.label"
description_key = "settings.trigger_action_map.description"
default = ""
advanced = true

[[setting]]
key = "youtube_channel_url"
type = "string"
label_key = "settings.youtube_channel_url.label"
description_key = "settings.youtube_channel_url.description"
default = "https://www.youtube.com/@LuixBits"

[[setting]]
key = "explanation_video_url"
type = "string"
label_key = "settings.explanation_video_url.label"
description_key = "settings.explanation_video_url.description"
