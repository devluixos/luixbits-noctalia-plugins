[[setting]]
key = "button_a_preset"
type = "select"
label_key = "settings.button_a_preset.label"
description_key = "settings.button_a_preset.description"
default = "none"
options = [
  { value = "none", label = "Do nothing" },
  { value = "notification_test", label = "Notification test" },
  { value = "media_play_pause", label = "Media play-pause" },
  { value = "volume_up", label = "Volume up" },
  { value = "volume_down", label = "Volume down" },
  { value = "screenshot_region", label = "Screenshot region" },
  { value = "clipboard", label = "Clipboard" },
  { value = "launcher", label = "Launcher" },
  { value = "lock", label = "Lock screen" },
